    <!--
      Anti-FOUC: load CSS via native <link> instead of only relying on
      Vite's JS-based injection (import './index.css').
      <link> is RENDER-BLOCKING: the browser won't paint until this CSS
      is loaded & parsed. On F5, the browser correctly re-applies cached
      CSS from a 304, unlike JS modules whose side-effects may not re-run.
      Vite intercepts this in dev & processes it through Tailwind;
      in production build it bundles + hashes the file automatically.
    -->
    <link rel="stylesheet" href="/src/index.css" />
